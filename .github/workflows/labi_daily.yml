name: Labi News & Daily Survey Launcher 🐰🚀

on:
  schedule:
    # 毎日 7:00, 11:00, 15:00, 19:00 JST (UTC 22:00, 2:00, 6:00, 10:00) に実行らびっ！
    - cron: '0 */3 * * *' # 3時間おきらびっ！🐰⏰ (UTC 0,3,6,9,12,15,18,21 -> JST 9,12,15,18,21,0,3,6)
  workflow_dispatch: # 手動実行も可能らび！

permissions:
  contents: read

jobs:
  post-survey:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm install

      - name: Run Auto News Poster Script 🥕
        run: node scripts/auto_latest_news.cjs
