name: Labi News & Daily Survey Launcher 🐰🚀

on:
  push:
    branches:
      - main
  schedule:
    # 毎日 JST 08:00 (朝), 12:00 (昼), 20:00 (夜) に実行らびっ！
    # UTC: 前日23:00, 03:00, 11:00
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch: # 手動実行も可能らび！

permissions:
  contents: read

jobs:
  post-survey:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
      VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm install

      - name: Run Auto News Poster Script 🥕
        run: node scripts/auto_latest_news.cjs
